<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accueil</title>

    <style>
        /* MENU FIXE */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(6px);
            padding: 15px 20px;

            display: flex;
            gap: 20px;
            justify-content: center; /* CENTRAGE DU MENU */

            border-bottom: 1px solid white;
            z-index: 1000;
        }

        .navbar a {
            color: white;
            text-decoration: none;
            font-size: 1.1rem;
            padding: 8px 14px;
            border-radius: 6px;
            transition: 0.3s;
        }

        .navbar a:hover {
            background: white;
            color: black;
        }

        /* STYLE GLOBAL */
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1e1e1e, #3a3a3a);
            color: white;
            padding: 40px;
            padding-top: 100px; /* espace pour le menu fixe */
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            text-align: center;
        }

        p {
            font-size: 1.2rem;
            opacity: 0.9;
            max-width: 900px;
            margin: auto;
            text-align: center;
        }

        .separator {
            width: 100%;
            height: 3px;
            background-color: white;
            margin: 60px 0;
            opacity: 0.7;
        }

        .content {
            margin-top: 60px;
            display: flex;
            gap: 40px;
            flex-wrap: wrap;
            align-items: flex-start;
        }

        .text-zone {
            flex: 1;
            min-width: 300px;
        }

        .cv-zone {
            flex: 1;
            max-width: 350px;
            text-align: center;
        }

        .cv-zone img {
            width: 100%;
            border: 2px solid white;
            border-radius: 8px;
            margin-bottom: 15px;
        }

        .download-btn {
            display: inline-block;
            padding: 12px 20px;
            border: 2px solid white;
            border-radius: 8px;
            color: white;
            text-decoration: none;
            transition: 0.3s;
        }

        .download-btn:hover {
            background: white;
            color: black;
        }

        .links-zone {
            flex: 1;
            min-width: 200px;
        }

        .links-zone a {
            display: block;
            margin-bottom: 15px;
            padding: 12px 20px;
            text-decoration: none;
            color: white;
            border: 2px solid white;
            border-radius: 8px;
            transition: 0.3s;
            text-align: center;
        }

        .links-zone a:hover {
            background: white;
            color: black;
        }
    </style>
</head>

<body>

    <!-- MENU FIXE -->
    <nav class="navbar">
        <a href="formations.html">Formations</a>
        <a href="profil.html">Profil</a>
        <a href="projets.html">Projets</a>
    </nav>

    <!-- SECTION ACCUEIL -->
    <h1>Bienvenue sur mon Portfolio</h1>

    <p>
        Sur ce site, vous trouverez un bref résumé de mon profil, des projets que j'ai pu réaliser et des formations et stages que j'ai effectués.
    </p>
    <p>
        Des versions plus détaillées de chaque partie pourront être trouvées dans les sections dédiées.
    </p>

</body>
</html>
