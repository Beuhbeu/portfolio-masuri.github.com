<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accueil</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1e1e1e, #3a3a3a);
            color: white;
            padding: 40px;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            text-align: center;
        }

        h2 {
            font-size: 2rem;
            margin-top: 0;
        }

        p {
            font-size: 1.2rem;
            opacity: 0.9;
            max-width: 900px;
        }

        .separator {
            width: 100%;
            height: 3px;
            background-color: white;
            margin: 60px 0;
            opacity: 0.7;
        }

        .content {
            margin-top: 60px;
            display: flex;
            gap: 40px;
            flex-wrap: wrap;
            align-items: flex-start;
        }

        .text-zone {
            flex: 1;
            min-width: 300px;
        }

        .cv-zone {
            flex: 1;
            max-width: 350px;
            text-align: center;
        }

        .cv-zone img {
            width: 100%;
            border: 2px solid white;
            border-radius: 8px;
            margin-bottom: 15px;
        }

        .download-btn {
            display: inline-block;
            padding: 12px 20px;
            border: 2px solid white;
            border-radius: 8px;
            color: white;
            text-decoration: none;
            transition: 0.3s;
        }

        .download-btn:hover {
            background: white;
            color: black;
        }

        .links-zone {
            flex: 1;
            min-width: 200px;
        }

        .links-zone a {
            display: block;
            margin-bottom: 15px;
            padding: 12px 20px;
            text-decoration: none;
            color: white;
            border: 2px solid white;
            border-radius: 8px;
            transition: 0.3s;
            text-align: center;
        }

        .links-zone a:hover {
            background: white;
            color: black;
        }
    </style>
</head>
<div class="top-links">

    </div>
